<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>AttendPro - Employees</title>
</head>

<body class="dashboard-body">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo">
          <img src="images/logo.png" alt="Company Logo" height="50px">
          <div>
            <h2>AttendPro</h2>
            <p>HR Operations</p>
          </div>
        </div>
      </div>
      <nav class="nav-links">
        <a href="dashboard.html" class="nav-link" data-page="dashboard"><span class="nav-icon">▦</span><span
            class="icon-name">Dashboard</span></a>
        <a href="employees.html" id="current-link" class="nav-link" data-page="employees"><span
            class="nav-icon">👥</span><span class="icon-name">Employees</span></a>
        <a href="attendance.html" class="nav-link" data-page="attendance"><span class="nav-icon">✓</span><span
            class="icon-name">Attendance</span></a>
        <a href="history.html" class="nav-link" data-page="history"><span class="nav-icon">📜</span><span
            class="icon-name">History</span></a>
        <a href="reports.html" class="nav-link active" data-page="reports"><span class="nav-icon">📈</span><span
            class="icon-name">Reports</span></a>
        <a href="settings.html" class="nav-link" data-page="settings"><span class="nav-icon">⚙</span><span
            class="icon-name">Settings</span></a>
      </nav>

      <button id="logoutBtn">Logout</button>
    </aside>

    <main class="main-content">
      <header class="header">
        <div class="topbar">
          <p>People management</p>
          <h3>Employee Directory</h3>
        </div>
        <div id="time-date">

          <p class="time-date" id="current-date"></p>
          <p class="time-date" id="current-time"></p>

        </div>
      </header>

      <section class="content-grid two-col">
        <div class="panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Create or update</p>
              <h3>Employee Form</h3>
            </div>
          </div>
          <form id="employeeForm" class="stacked-form">
            <div class="form-row">
              <div class="form-group">
                <label for="employeeId">Employee ID</label>
                <input id="employeeId" name="employeeId" type="text" required="">
              </div>
              <div class="form-group">
                <label for="employeeName">Full Name</label>
                <input id="employeeName" name="employeeName" type="text" required="">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="employeeEmail">Email</label>
                <input id="employeeEmail" name="employeeEmail" type="email" required="">
              </div>
              <div class="form-group">
                <label for="employeePhone">Phone</label>
                <input id="employeePhone" name="employeePhone" type="tel" required="">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="employeeDepartment">Department</label>
                <select id="employeeDepartment" name="employeeDepartment" required="">
                  <option value="">Select department</option>
                  <option>Engineering</option>
                  <option>HR</option>
                  <option>Finance</option>
                  <option>Operations</option>
                  <option>Sales</option>
                  <option>Marketing</option>
                </select>
              </div>
              <div class="form-group">
                <label for="employeeDesignation">Designation</label>
                <input id="employeeDesignation" name="employeeDesignation" type="text" required="">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="employeeJoining">Joining Date</label>
                <input id="employeeJoining" name="employeeJoining" type="date" required="">
              </div>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Save Employee</button>
              <button type="button" class="btn btn-ghost" id="resetEmployeeForm">Reset</button>
            </div>
          </form>
        </div>

        <div class="panel panel-large">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Directory</p>
              <h3>Employee List</h3>
            </div>
          </div>
          <div class="filters">
            <input id="employeeSearch" type="text" placeholder="Search by name or ID">
            <select id="employeeDepartmentFilter">
              <option value="">All departments</option>
              <option value="Engineering">Engineering</option>
              <option value="HR">HR</option>
              <option value="Finance">Finance</option>
              <option value="Operations">Operations</option>
            </select>
            <select id="employeeSort">
              <option value="name">Sort by name</option>
              <option value="joining">Sort by joining date</option>
            </select>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Employee</th>
                  <th>ID</th>
                  <th>Department</th>
                  <th>Designation</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="employeeTableBody">
                <!-- Employee rows will be dynamically inserted here -->



              </tbody>
            </table>
          </div>
        </div>
      </section>

    </main>
  </div>
  <script src="js/dashboard.js"></script>
</body>

</html>

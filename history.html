<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>AttendPro - History</title>
</head>

<body class="dashboard-body">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo">
          <img src="images/logo.png" alt="Company Logo" height="50px">
          <div>
            <h2>AttendPro</h2>
            <p>HR Operations</p>
          </div>
        </div>
      </div>
      <nav class="nav-links">
        <a href="dashboard.html" class="nav-link" data-page="dashboard"><span
            class="nav-icon">▦</span><span class="icon-name">Dashboard</span></a>
        <a href="employees.html" class="nav-link" data-page="employees"><span
            class="nav-icon">👥</span><span class="icon-name">Employees</span></a>
        <a href="attendance.html" class="nav-link" data-page="attendance"><span
            class="nav-icon">✓</span><span class="icon-name">Attendance</span></a>
        <a href="history.html" id="current-link" class="nav-link" data-page="history"><span
            class="nav-icon">📜</span><span class="icon-name">History</span></a>
        <a href="reports.html" class="nav-link active" data-page="reports"><span
            class="nav-icon">📈</span><span class="icon-name">Reports</span></a>
        <a href="settings.html" class="nav-link" data-page="settings"><span
            class="nav-icon">⚙</span><span class="icon-name">Settings</span></a>
      </nav>

      <button id="logoutBtn">Logout</button>
    </aside>
    <main class="main-content">
       <header class="header">
          <div class="topbar">
            <p>Historical records</p>
            <h3>Attendance History</h3>
          </div>
         <div id="time-date">

          <p class="time-date" id="current-date"></p>
          <p class="time-date" id="current-time"></p>

        </div>
        </header>
      <section class="panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Search and review</p>
              <h3>Records</h3>
            </div>
          </div>
          <div class="filters">
            <input id="historySearch" type="text" placeholder="Search by employee">
            <input id="historyDateFilter" type="date">
            <select id="historyDepartmentFilter"><option value="">All departments</option><option value="Engineering">Engineering</option><option value="HR">HR</option><option value="Finance">Finance</option><option value="Operations">Operations</option></select>
            <select id="historySort">
              <option value="date-desc">Newest first</option>
              <option value="date-asc">Oldest first</option>
              <option value="name">Name</option>
            </select>
          </div>

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Employee</th>
                  <th>Department</th>
                  <th>Date</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="historyTableBody">
            </tbody id="historyTableBody">

            </table>
          </div>

          <div class="pagination" id="pagination">
      <button class="page-btn active" data-page="1">1</button>
    </div>
        </section>
    </main>
  </div>

  <script src="js/dashboard.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>AttendPro - Attendance</title>
</head>

<body class="dashboard-body">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo">
          <img src="images/logo.png" alt="Company Logo" height="50px">
          <div>
            <h2>AttendPro</h2>
            <p>HR Operations</p>
          </div>
        </div>
      </div>
      <nav class="nav-links">
        <a href="dashboard.html" class="nav-link" data-page="dashboard"><span class="nav-icon">▦</span><span
            class="icon-name">Dashboard</span></a>
        <a href="employees.html" class="nav-link" data-page="employees"><span class="nav-icon">👥</span><span
            class="icon-name">Employees</span></a>
        <a href="attendance.html" id="current-link" class="nav-link" data-page="attendance"><span
            class="nav-icon">✓</span><span class="icon-name">Attendance</span></a>
        <a href="history.html" class="nav-link" data-page="history"><span class="nav-icon">📜</span><span
            class="icon-name">History</span></a>
        <a href="reports.html" class="nav-link active" data-page="reports"><span class="nav-icon">📈</span><span
            class="icon-name">Reports</span></a>
        <a href="settings.html" class="nav-link" data-page="settings"><span class="nav-icon">⚙</span><span
            class="icon-name">Settings</span></a>
      </nav>

      <button id="logoutBtn">Logout</button>
    </aside>
    <main class="main-content">
      <header class="header">
        <div class="topbar">
          <p>Daily operations</p>
          <h3>Attendance Register</h3>
        </div>
        <div id="time-date">

          <p class="time-date" id="current-date"></p>
          <p class="time-date" id="current-time"></p>

        </div>
      </header>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Attendance capture</p>
            <h3>Mark attendance for a selected day</h3>
          </div>
          <div class="attendance-date">
            <label for="attendanceDate">Date</label>
            <input id="attendanceDate" type="date">
          </div>
        </div>

        <div class="summary-strip" id="attendanceSummary">
          <div class="summary-pill">Date: 2026-07-11</div>
          <div class="summary-pill">Entries: 0</div>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Employee</th>
                <th>Department</th>
                <th>Designation</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="attendanceTableBody">
              
            </tbody>
          </table>
        </div>

        <div class="form-actions">
          <button id="saveAttendance" class="btn btn-primary">Save Attendance</button>
        </div>
      </section>

    </main>
  </div>

  <script src="js/main.js"></script>
</body>

</html>
